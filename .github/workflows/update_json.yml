name: Update sayan.json

on:
  schedule:
    - cron: "*/5 * * * *"   # runs every 5 minutes (minimum allowed)
  workflow_dispatch:        # allow manual run

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch and Format JSON
        run: |
          python update_json.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "sportlive18"
          git config --global user.email "271363488+sportlive18@users.noreply.github.com"
          git add sayan.json fancode.m3u
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update: JSON and M3U playlist"
            git push
          fi

