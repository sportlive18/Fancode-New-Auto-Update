name: Update sayan.json

on:
  schedule:
    - cron: "*/5 * * * *"   # runs every 5 minutes (minimum allowed)
  workflow_dispatch:        # allow manual run

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Create script from secret
        env:
          S_PY_CODE: ${{ secrets.S_PY_CODE }}
        shell: python
        run: |
          import os
          # We write the secret content to a temporary file
          with open('s.py', 'w', encoding='utf-8') as f:
              f.write(os.environ['S_PY_CODE'])

      - name: Fetch and Format JSON
        run: |
          python s.py

      - name: Securely remove script
        run: |
          rm s.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sayan.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update sayan.json"
            git push
          fi
